name: Test Suite

on:
  workflow_run:
    workflows: ["Code Quality"]
    types:
      - completed
    branches:
      - "**"

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        node-version: ["22.x", "25.x"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Initialize database
        run: |
          psql -h localhost -U postgres -c 'CREATE DATABASE testdb;'
          psql -h localhost -U postgres -d testdb -f migrations/000_initial_schema.sql
        env:
          PGPASSWORD: postgres

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          JWT_SECRET: test-jwt-secret-for-ci-environment-min-32-characters-long
          JWT_ACCESS_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 7d
          BCRYPT_ROUNDS: 4
          API_KEY_PREFIX: sk_test_
          API_KEY_LENGTH: 32
          NODE_ENV: test
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            coverage/
            junit.xml
          retention-days: 30

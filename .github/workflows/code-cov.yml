name: Run tests and upload coverage

on:
  push:
  pull_request:

jobs:
  test:
    name: Run tests and collect coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Initialize database
        run: |
          psql -h localhost -U postgres -c 'CREATE DATABASE testdb;'
          psql -h localhost -U postgres -d testdb -f migrations/000_initial_schema.sql
        env:
          PGPASSWORD: postgres

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          JWT_SECRET: test-jwt-secret-for-ci-environment-min-32-characters-long
          JWT_ACCESS_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 7d
          BCRYPT_ROUNDS: 4
          API_KEY_PREFIX: sk_test_
          API_KEY_LENGTH: 32
          NODE_ENV: test
        run: npx jest --coverage

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
